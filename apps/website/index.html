<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="VipStar Taksi - Şehrin En Prestijli Taksi Deneyimi" />
    <title>VipStar Taksi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Vendor CSS Files -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/aos.css" rel="stylesheet">
    <!-- Main CSS File -->
    <link href="/css/main.css" rel="stylesheet">
    <!-- VipStar Theme Overrides -->
    <style>
      :root {
        --vipstar-black: #0a0a0a;
        --vipstar-yellow: #facc15;
        --vipstar-dark: #1d283a;
      }
      
      /* Override Rideon colors with VipStar theme */
      .hero {
        background: linear-gradient(360deg, #0a0a0a 0%, #1d283a 100%) !important;
      }
      
      .hero:before {
        background-image: linear-gradient(to right, #facc15, #fef3c7, #facc15) !important;
      }
      
      .header {
        background-color: #0a0a0a !important;
      }
      
      .scrolled .header {
        background-color: #0a0a0a !important;
      }
      
      .navmenu>ul>li>a:before {
        background-color: #facc15 !important;
      }
      
      .stats-redesigned .stats-icon-wrapper {
        background-color: #0a0a0a !important;
      }
      
      .stats-redesigned .stats-icon-wrapper i {
        color: #facc15 !important;
      }
      
      .how-it-works-v2 .step-icon {
        background-color: #facc15 !important;
        color: #0a0a0a !important;
      }
      
      .features-redesigned .feature-icon {
        background: #facc15 !important;
      }
      
      .raintail {
        background: #0a0a0a !important;
      }
      
      .raintail h2 span {
        color: #facc15 !important;
      }
      
      .details.raintail .icon-box .cion {
        background-color: #facc15 !important;
      }
      
      #testimonials h2 span,
      #faq span {
        color: #facc15 !important;
      }
      
      .contact-v2 .contact-icon {
        background-color: #facc15 !important;
      }
      
      .contact-v2 .contact-card:hover {
        border-color: #facc15 !important;
      }
      
      .footer {
        background-color: #0a0a0a !important;
      }
      
      .footer .social-links a:hover {
        color: #facc15 !important;
        border-color: #facc15 !important;
      }
      
      .scroll-top {
        background-color: #facc15 !important;
      }
      
      .scroll-top i {
        color: #0a0a0a !important;
      }
      
      .store-button {
        background-color: #0a0a0a !important;
      }
      
      .store-button:hover {
        background-color: #facc15 !important;
        color: #0a0a0a !important;
      }
      
      .cta-glass {
        background-color: #0a0a0a !important;
      }
      
      .cta-glass .store-buttons-glass .store-button {
        background: rgba(250, 204, 21, 0.1) !important;
        border-color: rgba(250, 204, 21, 0.3) !important;
      }
      
      .cta-glass .store-buttons-glass .store-button:hover {
        background: rgba(250, 204, 21, 0.2) !important;
        border-color: rgba(250, 204, 21, 0.5) !important;
      }
      
      .aurora-glow {
        background: radial-gradient(circle, #facc15, transparent 70%) !important;
      }
      
      .testimonials .swiper-pagination .swiper-pagination-bullet-active {
        background-color: #facc15 !important;
      }
      
      .faq .faq-container .faq-item .faq-icon,
      .faq .faq-container .faq-active .faq-toggle {
        color: #facc15 !important;
      }
      
      .faq .faq-container .faq-active h3 {
        color: #facc15 !important;
      }
      
      .section-bg {
        background-color: #f8f9fa !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
